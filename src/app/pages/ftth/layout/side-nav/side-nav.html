<div class="side-nav">

  <div class="nav-header">
    <button class="close-btn" (click)="sidebarService.toggle()" aria-label="Close sidebar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="logo-section">
    <img src="/logo.png" alt="SLT Ribe Logo" class="logo-image">
  </div>

  <div class="divider"></div>

  <div class="nav-items">
    <div class="nav-group" [class.expanded]="item.expanded" *ngFor="let item of navItems">
      <div class="nav-item" 
           [class.active-item]="item.expanded || item.active" 
           (click)="toggleItem(item)">
        <span class="nav-icon" [innerHTML]="sanitize(item.rawIcon)"></span>
        <span class="nav-label" [class.active-label]="item.expanded || item.active">{{ item.label }}</span>
        
        <svg *ngIf="item.hasChildren" 
             class="arrow" 
             [class.rotated]="item.expanded"
             width="12" 
             height="12" 
             viewBox="0 0 24 24" 
             fill="none" 
             stroke="currentColor" 
             stroke-width="2.5" 
             stroke-linecap="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="sub-items" *ngIf="item.expanded && item.children?.length">
        <div
          class="sub-item"
          *ngFor="let child of item.children; let i = index"
          [class.active]="activePage === child.key"
          (click)="selectPage(child, $event)">
          <span class="dot" [ngClass]="getDotColor(i)"></span>
          <span class="sub-label" [class.active-sub-label]="activePage === child.key">{{ child.label }}</span>
        </div>
      </div>
    </div>
  </div>

</div>
