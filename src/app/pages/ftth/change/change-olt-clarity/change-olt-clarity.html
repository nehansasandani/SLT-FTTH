<div class="form-wrapper">
  <app-ftth-form header="Change OLT">

    <div class="field-row">
      <app-input-field label="FTTH NO"></app-input-field>
    </div>

    <div class="get-details-button">

      <app-button label="Get Details"></app-button>

    </div>

    <p class="content-header">Clarity</p>

    <div class="field-row">
      <app-input-field label="MSAN Location"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="MSAN Index"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="MSAN Type"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="MSAN IP"></app-input-field>
    </div>

    <div class="field-row">
        <app-input-dropdown label="OLT" selectedOption="NOKIA" [options]="['NOKIA']"></app-input-dropdown>
    </div>


  </app-ftth-form>
</div>
