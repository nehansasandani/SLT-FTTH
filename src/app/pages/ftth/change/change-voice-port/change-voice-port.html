<div class="form-wrapper">
  <app-ftth-form header="Port Change">

    <div class="field-row">
      <app-input-field label="FTTH NO"></app-input-field>
    </div>

    <div class="get-details-button">
      <app-button label="Get Details"></app-button>
    </div>

    <p class="content-header">Clarity</p>

    <div class="field-row-with-side">
      <app-input-field label="MSAN Location"></app-input-field>
      <app-side-text text="Change in Clarity"></app-side-text>
    </div>

    <div class="field-row-with-side">
      <app-input-field label="MSAN Index"></app-input-field>
      <app-side-text text="Delete voice Port"></app-side-text>
    </div>

    <div class="field-row-with-side">
      <app-input-field label="MSAN Type"></app-input-field>
      <app-side-text text="Remove Configuration"></app-side-text>
    </div>

    <div class="field-row-with-side">
      <app-input-field label="MSAN IP"></app-input-field>
      <app-side-text text="Add HSS Configuration"></app-side-text>
    </div>

    <div class="field-row-with-side">
      <div class="field-row">
        <app-input-dropdown label="Voice Port" selectedOption="1" [options]="['1']"></app-input-dropdown>
      </div>
      <app-side-text text="Add ATS Configuration"></app-side-text>
    </div>

    <div class="field-row">
      <app-input-field label="TID"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="OLT"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="Port"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="V_Port"></app-input-field>
    </div>

    <div class="field-row">
      <app-input-field label="DName"></app-input-field>
    </div>

  </app-ftth-form>
</div>
