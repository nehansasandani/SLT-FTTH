<div class="ftth-layout">
  <app-side-nav *ngIf="showSideNav" (pageSelected)="onPageSelected($event)" ></app-side-nav>

  <div class="content-area" *ngIf="showSideNav; else routeHint">
    <div class="page-intro">
      <p class="eyebrow">FTTH Operations</p>
      <h1>Fast service lookup</h1>
      <p class="page-copy">Choose a section from the left menu and work inside the centered panel.</p>
    </div>

    <div class="content-inner" *ngIf="activeNavItem === 'list'">
      <app-list-details></app-list-details>
    </div>
    <div class="content-inner" *ngIf="activeNavItem === 'admin'">
      <app-admin [activePage]="activePage"></app-admin>
    </div>
    <div class="content-inner" *ngIf="activeNavItem === 'suspend-resume'">
      <app-suspend-resume></app-suspend-resume>
    </div>
    <div class="content-inner" *ngIf="activeNavItem === 'change'">
      <app-change [activePage]="activePage"></app-change>
    </div>
  </div>

  <ng-template #routeHint>
    <div class="route-hint">
      <div class="route-hint-card">
        <p class="eyebrow">Navigation</p>
        <h1>Select FTTH</h1>
        <p class="page-copy">Click FTTH from the top navigation bar to open the slide menu and details panel.</p>
      </div>
    </div>
  </ng-template>
</div>
